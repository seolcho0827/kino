<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chart</title>
<link rel="stylesheet" href="../../styles/twilight/tokens.css">
<link rel="stylesheet" href="./chart.css">
<style>
body { margin: 0; padding: 12px; background: var(--color-background); font-family: var(--font-family-base); color: var(--color-on-surface); }
.row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.label { font-size: var(--font-size-eyebrow); font-weight: var(--font-weight-eyebrow); letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-muted-foreground); min-width: 92px; flex-shrink: 0; line-height: 1.4; }
hr.divider { border: none; border-top: 1px solid var(--color-border); margin: 12px 0; }
</style>
</head>
<body>
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
<symbol id="icon-arrow-up" viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
<symbol id="icon-arrow-down" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></symbol>
</svg>
<div class="row" data-evidence-sample="stat-card">
<span class="label">统计卡片</span>
<div class="stat-card">
<span class="stat-label">总浏览量</span>
<span class="stat-value">12,480</span>
<span class="stat-change up"><svg width="12" height="12"><use href="#icon-arrow-up"/></svg>12.5%</span>
</div>
<div class="stat-card">
<span class="stat-label">活跃用户</span>
<span class="stat-value">3,842</span>
<span class="stat-change up"><svg width="12" height="12"><use href="#icon-arrow-up"/></svg>8.2%</span>
</div>
<div class="stat-card">
<span class="stat-label">月收入</span>
<span class="stat-value">¥286,400</span>
<span class="stat-change down"><svg width="12" height="12"><use href="#icon-arrow-down"/></svg>2.1%</span>
</div>
</div>
<hr class="divider">
<div class="row" data-evidence-sample="sparkline">
<span class="label">趋势线</span>
<div class="sparkline-card">
<span class="stat-label">浏览量趋势</span>
<svg class="sparkline" viewBox="0 0 120 40" preserveAspectRatio="none"><path d="M0 35 L15 28 L30 30 L45 20 L60 22 L75 15 L90 18 L105 8 L120 12" fill="none" stroke="var(--chart-1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</div>
<div class="sparkline-card">
<span class="stat-label">用户增长</span>
<svg class="sparkline" viewBox="0 0 120 40" preserveAspectRatio="none"><path d="M0 30 L15 25 L30 20 L45 22 L60 15 L75 18 L90 10 L105 8 L120 5" fill="none" stroke="var(--chart-2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</div>
<div class="sparkline-card">
<span class="stat-label">转化率</span>
<svg class="sparkline" viewBox="0 0 120 40" preserveAspectRatio="none"><path d="M0 15 L15 20 L30 12 L45 25 L60 18 L75 30 L90 22 L105 28 L120 20" fill="none" stroke="var(--chart-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
</div>
</div>
</body>
</html>
