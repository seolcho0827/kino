<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: var(--space-3); background: var(--color-surface); font-family: var(--font-body); color: var(--color-on-surface); }
.label { font-size: var(--font-size-eyebrow); font-weight: var(--font-weight-eyebrow); letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-muted-foreground); }
.row { display: flex; gap: var(--space-2); align-items: center; width: 100%; }
.row + .row { margin-top: var(--space-2); }
.divider { border: none; border-top: 1px solid var(--color-outline); margin: var(--space-4) 0; }
/* @component-css-start */
.nav-topbar { display: flex; align-items: center; justify-content: space-between; width: 100%; height: 56px; padding: 0 var(--space-8); background: rgba(28,28,30,0.72); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
.nav-topbar__brand { font-family: var(--font-heading); font-size: var(--font-size-h4); font-weight: var(--font-weight-h4); color: #fff; text-decoration: none; white-space: nowrap; }
.nav-topbar__links { display: flex; gap: var(--space-4); align-items: center; }
.nav-topbar__link { font-size: var(--font-size-body); font-weight: var(--font-weight-body); color: rgba(255,255,255,0.65); text-decoration: none; white-space: nowrap; transition: filter .15s; padding: var(--space-1) 0; }
.nav-topbar__link:hover { filter: brightness(1.12); }
.nav-topbar__link--active { color: var(--color-primary); }
.nav-topbar__actions { display: flex; gap: var(--space-3); align-items: center; flex-shrink: 0; }
.nav-topbar__icon { color: rgba(255,255,255,0.65); cursor: pointer; transition: filter .15s; flex-shrink: 0; }
.nav-topbar__icon:hover { filter: brightness(1.12); }
.nav-avatar { width: 32px; height: 32px; border-radius: var(--radius-full); background: var(--color-primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: var(--font-size-caption); font-weight: var(--font-weight-eyebrow); flex-shrink: 0; }
.nav-breadcrumb { display: flex; align-items: center; gap: var(--space-2); width: 100%; }
.nav-breadcrumb__item { font-size: var(--font-size-caption); color: var(--color-muted-foreground); text-decoration: none; white-space: nowrap; transition: filter .15s; }
.nav-breadcrumb__item:hover { filter: brightness(0.85); }
.nav-breadcrumb__item--current { color: var(--color-on-surface); cursor: default; }
.nav-breadcrumb__item--current:hover { filter: none; }
.nav-breadcrumb__sep { color: var(--color-muted-foreground); flex-shrink: 0; }
/* @component-css-end */
</style>
</head>
<body>
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
<symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></symbol>
<symbol id="i-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></symbol>
</svg>
<div class="row"><span class="label">Topbar</span></div>
<div class="row"><nav class="nav-topbar" data-evidence-sample="topbar"><span class="nav-topbar__brand">test</span><div class="nav-topbar__links"><a href="#" class="nav-topbar__link nav-topbar__link--active">电影</a><a href="#" class="nav-topbar__link">电视</a><a href="#" class="nav-topbar__link">人物</a><a href="#" class="nav-topbar__link">排行</a></div><div class="nav-topbar__actions"><svg class="nav-topbar__icon" width="20" height="20"><use href="#i-search"/></svg><div class="nav-avatar">U</div></div></nav></div>
<hr class="divider">
<div class="row"><span class="label">Breadcrumb</span></div>
<div class="row"><nav class="nav-breadcrumb" data-evidence-sample="breadcrumb"><a href="#" class="nav-breadcrumb__item">首页</a><svg class="nav-breadcrumb__sep" width="14" height="14"><use href="#i-chevron"/></svg><a href="#" class="nav-breadcrumb__item">电影</a><svg class="nav-breadcrumb__sep" width="14" height="14"><use href="#i-chevron"/></svg><a href="#" class="nav-breadcrumb__item">动作</a><svg class="nav-breadcrumb__sep" width="14" height="14"><use href="#i-chevron"/></svg><span class="nav-breadcrumb__item nav-breadcrumb__item--current">当前页</span></nav></div>
</body>
</html>
